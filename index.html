<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Generator🎵 AI </title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="contaner">
        <header>
            <h1 class="heading">🎵 Song Generator AI</h1>
        </header>
        <main>
            <div class="form-contaner">
                <form >
                    <input type="text" autofocus required autocomplete="off" placeholder="Enter a song name" class="searchBox" id="searchBox">
                    <input type="submit" value="Generate" class="submit-button" id="submit-button">
                </form>
                <div class="examples">i.e love/friendship/rain/college life</div>
            </div>
            <div class="song-generator hidden" id="song-generator">
                
            </div>

        </main>
        <footer>
            <p> This AI project was coded by 
            <a href="https://github.com/asiya2123">Sk.Asiya</a>
            and  is <a href="https://github.com/asiya2123/song-Generated-AI.git">open source on GitHub</a> 
            and is <a href="https://songgeneratedai.netlify.app/">hosted on Netlify</a> </p>
        </footer>
    </div>
    <script src="src/script.js"></script>
</body>
</html>
